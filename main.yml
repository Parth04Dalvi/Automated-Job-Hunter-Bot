name: Job Hunter Bot

on:
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9am UTC
  workflow_dispatch: # Allows you to trigger it manually via the 'Actions' tab

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: allows the bot to update seen_jobs.txt
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python scraper.py

      - name: Save Progress
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add seen_jobs.txt
          git commit -m "Update seen jobs database [skip ci]" || echo "No changes to commit"
          git push
